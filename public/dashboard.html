<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Project Antigravity - Game Lobby Dashboard">
  <title>Dashboard | Project Antigravity</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="dashboard-page">
  <!-- Animated background -->
  <div class="bg-grid"></div>
  <div class="bg-glow bg-glow--1"></div>
  <div class="bg-glow bg-glow--2"></div>

  <!-- Top Bar -->
  <header class="top-bar">
    <div class="top-bar-left">
      <span class="top-bar-logo gradient-text">⚡ Antigravity</span>
      <div class="connection-status" id="connection-status">
        <span class="connection-dot"></span>
        <span class="connection-text">Connecting...</span>
      </div>
    </div>
    <div class="top-bar-right">
      <div class="user-badge" id="user-badge">
        <div class="user-avatar" id="user-avatar">?</div>
        <span id="user-name">Loading...</span>
      </div>
      <button class="btn btn-sm btn-secondary" id="logout-btn">Logout</button>
    </div>
  </header>

  <!-- Dashboard Content -->
  <div class="dashboard-content">
    <div class="dashboard-header">
      <div>
        <h1 class="dashboard-title">Game Lobby</h1>
        <p class="text-muted" style="font-size: 0.9rem;">Create or join a multiplayer room</p>
      </div>
      <button class="btn btn-primary" id="create-room-btn">
        <span>+ Create Room</span>
      </button>
    </div>

    <!-- Rooms Grid -->
    <div id="rooms-container">
      <div class="rooms-grid" id="rooms-grid">
        <!-- Room cards are dynamically inserted here -->
      </div>
      <div class="empty-state" id="empty-state" style="display:none;">
        <div class="empty-state-icon">🎮</div>
        <h3 class="empty-state-title">No rooms yet</h3>
        <p>Create a room to start playing!</p>
      </div>
    </div>
  </div>

  <!-- Create Room Modal -->
  <div class="modal-overlay" id="create-modal">
    <div class="modal">
      <h2 class="modal-title">Create Room</h2>
      <form class="modal-form" id="create-room-form">
        <div class="form-group">
          <label class="form-label">Room Name</label>
          <div class="input-group">
            <input type="text" id="room-name-input" placeholder="My Awesome Room" maxlength="40" required>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">ROM File</label>
          <select id="rom-select" required>
            <option value="">Loading ROMs...</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Max Players</label>
          <select id="max-players-select">
            <option value="2">2 Players</option>
            <option value="3">3 Players</option>
            <option value="4" selected>4 Players</option>
          </select>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-secondary" id="cancel-modal-btn">Cancel</button>
          <button type="submit" class="btn btn-primary">Create Room</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Toast container -->
  <div class="toast-container" id="toast-container"></div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/dashboard.js"></script>
</body>
</html>

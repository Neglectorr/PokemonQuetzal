<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Project Antigravity - GBA Cloud Multiplayer Platform">
  <title>Project Antigravity | GBA Cloud</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="login-page">
  <!-- Animated background -->
  <div class="bg-grid"></div>
  <div class="bg-glow bg-glow--1"></div>
  <div class="bg-glow bg-glow--2"></div>
  <div class="bg-glow bg-glow--3"></div>

  <main class="login-container">
    <!-- Logo & Title -->
    <div class="login-header">
      <div class="logo-icon">
        <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="4" y="12" width="56" height="40" rx="8" fill="url(#gba-grad)" stroke="#8b5cf6" stroke-width="2"/>
          <rect x="14" y="18" width="36" height="24" rx="3" fill="#0f0f23" stroke="#6366f1" stroke-width="1.5"/>
          <circle cx="48" cy="46" r="3" fill="#22c55e"/>
          <circle cx="40" cy="46" r="3" fill="#ef4444"/>
          <rect x="18" y="46" width="10" height="3" rx="1.5" fill="#475569"/>
          <defs>
            <linearGradient id="gba-grad" x1="4" y1="12" x2="60" y2="52">
              <stop stop-color="#1e1b4b"/>
              <stop offset="1" stop-color="#312e81"/>
            </linearGradient>
          </defs>
        </svg>
      </div>
      <h1 class="login-title">
        <span class="gradient-text">Project Antigravity</span>
      </h1>
      <p class="login-subtitle">GBA Cloud Multiplayer Platform</p>
      <p class="login-description">Server-side emulation • Link Cable & Wireless Adapter • Up to 4 players</p>
    </div>

    <!-- Login Card -->
    <div class="glass-card login-card">
      <!-- Debug Auth Form -->
      <div id="debug-auth" class="login-section">
        <h2 class="section-title">Quick Login</h2>
        <p class="section-desc">Enter a username to start playing</p>
        <form id="login-form" class="login-form">
          <div class="input-group">
            <input 
              type="text" 
              id="username-input" 
              name="username" 
              placeholder="Choose a username..." 
              minlength="2" 
              maxlength="20" 
              required 
              autocomplete="off"
              spellcheck="false"
            >
            <div class="input-glow"></div>
          </div>
          <button type="submit" id="login-btn" class="btn btn-primary btn-lg">
            <span class="btn-text">Enter the Arena</span>
            <span class="btn-icon">→</span>
          </button>
        </form>
        <div id="login-error" class="error-message" hidden></div>
      </div>

      <div class="divider">
        <span>or</span>
      </div>

      <!-- Google OAuth -->
      <div class="login-section">
        <a href="/auth/google" id="google-login-btn" class="btn btn-google">
          <svg class="google-icon" viewBox="0 0 24 24" width="20" height="20">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          <span>Continue with Google</span>
        </a>
      </div>
    </div>

    <!-- Features -->
    <div class="features-row">
      <div class="feature-pill">
        <span class="feature-icon">🎮</span>
        <span>Server-Side Emulation</span>
      </div>
      <div class="feature-pill">
        <span class="feature-icon">🔗</span>
        <span>Link Cable + Wireless</span>
      </div>
      <div class="feature-pill">
        <span class="feature-icon">👥</span>
        <span>Up to 4 Players</span>
      </div>
    </div>
  </main>

  <script src="/js/auth.js"></script>
</body>
</html>

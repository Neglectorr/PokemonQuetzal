<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANTIGRAWITY PORTAL | Next-Gen GBA</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #05050a;
            --surface: rgba(255, 255, 255, 0.03);
            --accent: #a855f7;
            --accent-glow: rgba(168, 85, 247, 0.4);
            --text: #e2e8f0;
        }

        body {
            margin: 0;
            background: var(--bg);
            color: var(--text);
            font-family: 'Outfit', sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        .background-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 800px;
            height: 800px;
            background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
            z-index: -1;
            filter: blur(80px);
            opacity: 0.5;
        }

        .container {
            position: relative;
            padding: 20px;
            border-radius: 32px;
            background: var(--surface);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        h1 {
            margin: 0;
            font-weight: 700;
            letter-spacing: 4px;
            text-transform: uppercase;
            font-size: 14px;
            color: var(--accent);
            text-shadow: 0 0 10px var(--accent);
        }

        canvas {
            width: 720px; /* 3x Scale */
            height: 480px;
            background: #000;
            border-radius: 12px;
            image-rendering: pixelated;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.8);
            border: 2px solid #111;
        }

        .status-bar {
            display: flex;
            gap: 20px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            opacity: 0.6;
        }

        .controls-hint {
            position: absolute;
            bottom: -60px;
            display: flex;
            gap: 30px;
            font-size: 12px;
            opacity: 0.4;
        }

        .badge {
            padding: 4px 12px;
            background: var(--accent);
            color: #fff;
            border-radius: 20px;
            font-weight: 700;
            font-size: 10px;
        }

        #loading-overlay {
            position: absolute;
            inset: 0;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            border-radius: 32px;
            transition: opacity 0.5s;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(168, 85, 247, 0.1);
            border-top: 3px solid var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="background-glow"></div>

    <div class="container" id="portal-ui">
        <div id="loading-overlay">
            <div class="spinner"></div>
            <p style="margin-top: 20px; font-size: 12px; opacity: 0.6;">WARPING ROM DATA...</p>
        </div>

        <div style="display: flex; align-items: center; gap: 10px; width: 100%; justify-content: space-between;">
            <h1>Antigrawity Portal</h1>
            <div class="badge">NATIVE-60FPS</div>
        </div>

        <canvas id="mgba-canvas" width="240" height="160"></canvas>

        <div class="status-bar">
            <span>CPU: <span id="fps">0.0</span>%</span>
            <span>SYNC: <span id="sync-status" style="color: #4ade80;">LOCAL-ONLY</span></span>
            <span>PLAYER: <span id="player-id">GUEST</span></span>
        </div>

        <div class="controls-hint">
            <span>ARROWS: MOVE</span>
            <span>[X]: A</span>
            <span>[Z]: B</span>
            <span>[ENTER]: START</span>
            <span>[BS]: SELECT</span>
        </div>
    </div>

    <script type="module">
        import mGBA from '/wasm/mgba.js';

        const canvas = document.getElementById('mgba-canvas');
        const overlay = document.getElementById('loading-overlay');
        const fpsEl = document.getElementById('fps');
        
        async function init() {
            try {
                const module = await mGBA({ canvas });
                await module.FSInit();
                
                // Fetch the ROM from the server
                const response = await fetch('/roms/QuetzalEnglishAlpha8v4.gba');
                if (!response.ok) throw new Error("Could not find ROM on server.");
                
                const romBuffer = await response.arrayBuffer();
                module.FS.writeFile('/data/game.gba', new Uint8Array(romBuffer));
                
                // Load game
                const success = module.loadGame('/data/game.gba');
                if (!success) throw new Error("mGBA failed to load ROM.");
                
                module.resumeGame();
                
                // Keyboard Bindings (Default mGBA mapping)
                // We'll use the module's built-in buttonPress/buttonUnpress
                const keyMap = {
                    'ArrowUp': 'Up',
                    'ArrowDown': 'Down',
                    'ArrowLeft': 'Left',
                    'ArrowRight': 'Right',
                    'x': 'A',
                    'z': 'B',
                    'Enter': 'Start',
                    'Backspace': 'Select',
                    'a': 'L',
                    's': 'R'
                };

                window.addEventListener('keydown', (e) => {
                    const btn = keyMap[e.key];
                    if (btn) {
                        e.preventDefault();
                        module.buttonPress(btn);
                    }
                });

                window.addEventListener('keyup', (e) => {
                    const btn = keyMap[e.key];
                    if (btn) {
                        e.preventDefault();
                        module.buttonUnpress(btn);
                    }
                });

                // Stats loop
                setInterval(() => {
                    // Just a funny fake CPU usage tracker for the prototype
                    fpsEl.innerText = (Math.random() * 2 + 1).toFixed(1);
                }, 1000);

                // Reveal UI
                setTimeout(() => {
                    overlay.style.opacity = '0';
                    setTimeout(() => overlay.remove(), 500);
                }, 1000);

            } catch (err) {
                console.error(err);
                document.body.innerHTML = \`<div style="color: red; font-family: monospace;">ERROR: \${err.message}</div>\`;
            }
        }

        init();
    </script>
</body>
</html>

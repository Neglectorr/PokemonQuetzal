<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANTIGRAWITY PORTAL | Server-Side GBA</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root {
            --bg: #05050a;
            --surface: rgba(255, 255, 255, 0.03);
            --accent: #a855f7;
            --accent-glow: rgba(168, 85, 247, 0.4);
            --text: #e2e8f0;
        }

        body {
            margin: 0;
            background: var(--bg);
            color: var(--text);
            font-family: 'Outfit', sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        .background-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 800px;
            height: 800px;
            background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
            z-index: -1;
            filter: blur(80px);
            opacity: 0.5;
        }

        .container {
            position: relative;
            padding: 20px;
            border-radius: 32px;
            background: var(--surface);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        h1 {
            margin: 0;
            font-weight: 700;
            letter-spacing: 4px;
            text-transform: uppercase;
            font-size: 14px;
            color: var(--accent);
            text-shadow: 0 0 10px var(--accent);
        }

        canvas {
            width: 720px;
            height: 480px;
            background: #000;
            border-radius: 12px;
            image-rendering: pixelated;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.8);
            border: 2px solid #111;
        }

        .status-bar {
            display: flex;
            gap: 20px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            opacity: 0.6;
        }

        #loading-overlay {
            position: absolute;
            inset: 0;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            border-radius: 32px;
            transition: opacity 0.5s;
        }

        .spinner { width: 40px; height: 40px; border: 3px solid rgba(168, 85, 247, 0.1); border-top: 3px solid var(--accent); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="background-glow"></div>

    <div class="container" id="portal-ui">
        <div id="loading-overlay">
            <div class="spinner"></div>
            <p style="margin-top: 20px; font-size: 12px; opacity: 0.6;">DOCKING WITH SERVER-CORE...</p>
        </div>

        <div style="display: flex; align-items: center; gap: 10px; width: 100%; justify-content: space-between;">
            <h1>Antigrawity Portal</h1>
            <div style="padding: 4px 12px; background: var(--accent); color: #fff; border-radius: 20px; font-weight: 700; font-size: 10px;">SERVER-SIDE WASM</div>
        </div>

        <canvas id="mgba-canvas" width="240" height="160"></canvas>

        <div class="status-bar">
            <span>PING: <span id="ping">0</span>ms</span>
            <span>LATENCY: <span id="sync-status" style="color: #4ade80;">0.0ms (SHARED-RAM)</span></span>
        </div>
    </div>

    <script>
        const socket = io();
        const canvas = document.getElementById('mgba-canvas');
        const ctx = canvas.getContext('2d');
        const overlay = document.getElementById('loading-overlay');
        const pingEl = document.getElementById('ping');

        socket.emit('auth', { id: 'debug_portal', username: 'PortalUser' });

        let frameCount = 0;
        socket.on('frame', (frame) => {
            if (overlay) {
                overlay.style.opacity = '0';
                setTimeout(() => overlay.remove(), 500);
            }

            const binary = atob(frame.data);
            const array = new Uint8ClampedArray(binary.length);
            for (let i = 0; i < binary.length; i++) array[i] = binary.charCodeAt(i);
            
            const imageData = new ImageData(array, 240, 160);
            ctx.putImageData(imageData, 0, 0);
            frameCount++;
        });

        // Ping tracker
        setInterval(() => {
            const start = Date.now();
            socket.volatile.emit('ping', () => {
                pingEl.innerText = Date.now() - start;
            });
        }, 2000);

        // Input relay
        const keyMap = {
            'ArrowUp': 'Up', 'ArrowDown': 'Down', 'ArrowLeft': 'Left', 'ArrowRight': 'Right',
            'x': 'A', 'z': 'B', 'Enter': 'Start', 'Backspace': 'Select', 'a': 'L', 's': 'R'
        };

        window.addEventListener('keydown', (e) => {
            if (keyMap[e.key]) { e.preventDefault(); socket.emit('player-input', { button: keyMap[e.key], isPressed: true }); }
        });

        window.addEventListener('keyup', (e) => {
            if (keyMap[e.key]) { e.preventDefault(); socket.emit('player-input', { button: keyMap[e.key], isPressed: false }); }
        });
    </script>
</body>
</html>
